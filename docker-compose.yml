services:

  # Base de données PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Microservice Go
  ivorioci-stream-service:
    build:
      context: ./ivorioci-stream-service
      dockerfile: Dockerfile
      target: production
    container_name: ivorioci-stream-service
    restart: unless-stopped
    environment:
      PORT:         8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}?sslmode=disable
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/service", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # API Gateway Node.js + Prisma
  api-gateway:
    build:
      context: ./ivorioci-gateway
      dockerfile: Dockerfile
      target: production
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:          production
      PORT:              3000
      DATABASE_URL:      postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}?sslmode=disable
      MICROSERVICE_URL:  http://ivorioci-stream-service:8080
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      ivorioci-stream-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local

# Réseau interne isolé
networks:
  internal:
    driver: bridge